services:
  agentguard-api:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      AGENTGUARD_DB: /data/agentguard_audit.db
      AGENTGUARD_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    volumes:
      - agentguard-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  agentguard-web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      agentguard-api:
        condition: service_healthy

volumes:
  agentguard-data:
